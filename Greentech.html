<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Salvemos el Planeta - GreenTech</title>
    <!--Borramos lo que no necsitamos de forma que dejamos solo lo imprescindible y 
    acortamos la fuente monserrat a solo lo que queremos-->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <!--Modificamos el CSS y hacemos que La imagen sea más eficiente poniendola como img y 
    aplicandole y lazy loading-->
    <style>
      body {
        font-family: "Montserrat", sans-serif;
        background-color: #f4fdf4;
        margin: 0;
      }
    .hero {
      position: relative;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: white;
      overflow: hidden;
    }

    .hero img {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
      filter: brightness(0.7);
    }

    h1 {
      font-size: 3rem;
      margin: 0;
    }

    p {
      font-size: 1.5rem;
      margin-top: 10px;
    }
    .btn {
      margin-top: 20px;
      background-color: #28a745;
      border: none;
      padding: 12px 30px;
      font-size: 1.2rem;
      border-radius: 40px;
      color: white;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

   .btn:hover {
      background-color: #218838;
    }
    </style>
  </head>
  <body>
      <section class="hero">
      <!-- Aqui voy a optimizar la imagen con lazy loading -->
      <img 
        src="https://images.unsplash.com/photo-1542601906990-b4d3fb778b09?q=80&w=1200&auto=format&fit=crop"
        alt="Naturaleza verde"
        loading="lazy"
      />

      <div>
        <h1>Salvemos el Planeta</h1>
        <p>Únete a la revolución verde de GreenTech.</p>
        <button class="btn">Quiero ayudar</button>
      </div>
    </section>


    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>


    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
    <script>
      $(document).ready(function () {
        const anioActual = moment().format("YYYY");
        $("body").append(
          '<footer class="text-center p-3 bg-dark text-white" style="width: 100%;">GreenTech Solutions &copy; ' +
            anioActual +
            " - Haciendo un mundo mejor (pero calentando tu CPU)</footer>",
        );
      });
    </script>
    
  </body>
</html>
