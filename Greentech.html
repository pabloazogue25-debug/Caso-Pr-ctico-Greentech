<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Salvemos el Planeta - GreenTech</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Montserrat", sans-serif;
        background-color: #f4fdf4;
        margin: 0;
      }
      .hero-gigante {
        background-image: url("https://images.unsplash.com/photo-1542601906990-b4d3fb778b09?q=80&w=3000&auto=format&fit=crop");
        background-size: cover;
        background-position: center;
        height: 100vh;
        color: white;
        text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.8);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 20px;
      }
        .btn {
      margin-top: 20px;
      background-color: #28a745;
      border: none;
      padding: 12px 30px;
      font-size: 1.2rem;
      border-radius: 40px;
      color: white;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }
   .btn:hover {
      background-color: #218838;
    }
    </style>
  </head>
  <body>
    <div class="hero-gigante">
      <h1 class="display-1 fw-bold">Salvemos el Planeta</h1>
      <p class="lead fs-3 mt-3">Únete a la revolución verde de GreenTech.</p>


      <button class="btn"> Quiero ayudar</button>
    </div>


    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>


    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
    <script>
      $(document).ready(function () {
        const anioActual = moment().format("YYYY");
        $("body").append(
          '<footer class="text-center p-3 bg-dark text-white" style="width: 100%;">GreenTech Solutions &copy; ' +
            anioActual +
            " - Haciendo un mundo mejor (pero calentando tu CPU)</footer>",
        );
      });
    </script>
  </body>
</html>
